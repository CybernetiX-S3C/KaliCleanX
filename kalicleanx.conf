# =======================================================================
# KaliCleanX Configuration File
# Location: /etc/kalicleanx.conf
# Edit this file to customize KaliCleanX behavior.
# Lines starting with # are comments.
# =======================================================================

# Log file location
LOG_FILE="/var/log/kalicleanx.log"

# Journal vacuum settings
JOURNAL_MAX_TIME="2d"     # Vacuum journals older than this (e.g. 1d, 2d, 1w)
JOURNAL_MAX_SIZE="50M"    # Vacuum journals exceeding this size

# Cleaners to skip in Run ALL mode (comma-separated module numbers)
# Example: SKIP_CLEANERS="14,15" skips Flatpak and Snap cleaners
SKIP_CLEANERS=""

# Automatically include Docker clean in Run ALL (true/false)
AUTO_DOCKER=true

# =======================================================================
# Example: disable Snap + Flatpak cleaners (not installed on this system)
# SKIP_CLEANERS="14,15"
# =======================================================================
